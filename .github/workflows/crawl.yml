name: Crawl Swisscom offers by keyword

on:
  schedule:
    - cron: '0 4 * * *'   # ogni giorno alle 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio

      - name: Run crawler
        run: node keyword_crawler.mjs

      - name: Commit updated offers.json
        run: |
          git config user.name "offers-bot"
          git config user.email "offers-bot@users.noreply.github.com"
          git add offers.json
          git diff --staged --quiet || git commit -m "chore: update offers.json [skip ci]"
          git push
